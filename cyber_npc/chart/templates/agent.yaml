apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agent
  labels:
    app: agent
spec:
  serviceName: agent
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: init-ssh-keys
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          if [ ! -f /root/.ollama/id_ed25519 ] || [ ! -f /root/.ollama/id_ed25519.pub ]; then
            echo "SSH keys not found, copying from secret..."
            mkdir -p /root/.ollama
            ls /ssh-secret/
            cp /ssh-secret/id_ed25519 /root/.ollama/id_ed25519
            cp /ssh-secret/id_ed25519.pub /root/.ollama/id_ed25519.pub
            chmod 600 /root/.ollama/id_ed25519
            chmod 644 /root/.ollama/id_ed25519.pub
            echo "SSH keys installed"
          else
            echo "SSH keys already exist, skipping"
          fi
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
        - name: ssh-secret
          mountPath: /ssh-secret
          readOnly: true
      containers:
      - name: ollama
        image: ollama/ollama:latest
        env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: creds
              key: ollama-api-key
        - name: OLLAMA_MODEL
          value: "qwen:3.5"
        ports:
        - containerPort: 11434
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      - name: openclaw
        image: hattmo/openclaw:{{ .Values.images.openclaw.tag }}
        env:
        - name: HOME
          value: /home/node
        - name: TZ
          value: UTC
        - name: MATRIX_HOSTNAME
          value: matrix.{{ .Release.Namespace }}.svc.cluster.local
        - name: MATRIX_PASSWORD
          valueFrom:
            secretKeyRef:
              name: creds
              key: matrix-password
        - name: INDEX
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: NODE_EXTRA_CA_CERTS
          value: /usr/local/share/ca-certificates/matrix-ca/ca.crt
        volumeMounts:
        - name: matrix-ca
          mountPath: /usr/local/share/ca-certificates/matrix-ca
          readOnly: true
        ports:
        - containerPort: 18789
        livenessProbe:
          httpGet:
            path: /healthz
            port: 18789
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 18789
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 20
      volumes:
      - name: ssh-secret
        secret:
          secretName: creds
          defaultMode: 0600
      - name: matrix-ca
        secret:
          secretName: matrix-ca
          defaultMode: 0644
  volumeClaimTemplates:
  - metadata:
      name: ollama-storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
