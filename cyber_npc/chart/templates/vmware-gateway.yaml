apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmware-gateway
  labels:
    app: vmware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmware
  template:
    metadata:
      labels:
        app: vmware
    spec:
      containers:
      - name: app
        image: hattmo/vmware-gateway:{{ .Values.images.vmwareGateway.tag }}
        env:
        - name: VC_HOSTNAME
          valueFrom:
            secretKeyRef:
              name: creds
              key: vcenter-hostname
        - name: VC_USERNAME
          valueFrom:
            secretKeyRef:
              name: creds
              key: vcenter-username
        - name: VC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: creds
              key: vcenter-password
        - name: VC_PORT
          valueFrom:
            secretKeyRef:
              name: creds
              key: vcenter-port
        - name: VM_WHITE_LIST
          valueFrom:
            secretKeyRef:
              name: creds
              key: vcenter-white-list

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vmware-gateway
spec:
  type: ClusterIP
  selector:
    app: vmware
  ports:
  - port: 80
    targetPort: 8080
