apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
  project: default
  sources:
    - chart: metallb
      repoURL: https://metallb.github.io/metallb
  destination:
    server: https://kubernetes.default.svc
